# Run 2: Gemma-2-2b BASE with GemmaScope SAE
#
# Change from Run 1: base model instead of -it, extended alpha grid
# SAE is the same (trained on base model activations anyway)

model:
  model_id: "google/gemma-2-2b"
  device: "auto"  # Auto-detects MPS > CUDA > CPU
  dtype: "bfloat16"
  max_new_tokens: 64
  temperature: 0.0
  do_sample: false
  use_chat_template: false

sae:
  source: "neuronpedia"
  sae_set: "gemmascope-res-16k"
  sae_id: "20-gemmascope-res-16k/2263"
  layer_idx: 20
  hook_point: "blocks.20.hook_resid_post"
  normalize_decoder: true
  weights_repo: "google/gemma-scope-2b-pt-res"
  weights_path: "layer_20/width_16k/average_l0_71/params.npz"
  n_features_total: 16384

architecture:
  d_model: 2304
  n_layers: 18
  vocab_size: 256000

sae_specs:
  decoder_shape: [16384, 2304]

features:
  n_features: 300
  selection_mode: "contrast_delta"
  activation_stats_path: null
  selected_features_file: "outputs/selected_features.json"
  tau_act: 2.0
  token_span: "last_n"
  token_span_last_n: 8

steering:
  alpha_grid: [0.0, 1.0, 2.0, 5.0, 10.0, 20.0, 40.0, 60.0, 80.0]
  threshold_T: 0.10
  alpha0: 1.0
  tau: 0.1

benchmark:
  name: "salad_bench"
  prompt_count: 100
  prompt_csv: "data/prompts/salad_alpha.csv"
  prompt_template: "prompt column; refusal mode (no target column needed)"

generation:
  max_new_tokens: 64

experiment:
  name: "gemma2-2b-base-gemmascope-res16k-layer20"
  seed: 42
  phase: 2

sanity:
  feature_id: 2263
  feature_ids: [2317, 8978, 15199, 2713, 10792, 4378, 5441, 8195, 14537, 14885]
