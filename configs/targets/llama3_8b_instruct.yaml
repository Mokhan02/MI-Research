# Llama 3.1 8B Instruct + andyrdt BatchTopK SAE
#
# Model: meta-llama/Llama-3.1-8B-Instruct
# SAE: andyrdt/saes-llama-3.1-8b-instruct (BatchTopK, 32x expansion = 131k features)
# Layer: 15 (middle; available layers: 3, 7, 11, 15, 19, 23, 27)
# Trainer: trainer_0 (seed 0, k=32)

model:
  model_id: "meta-llama/Llama-3.1-8B-Instruct"
  device: "cuda"
  dtype: "bfloat16"
  max_new_tokens: 64
  temperature: 0.0
  do_sample: false

sae:
  source: "andyrdt"
  sae_set: "andyrdt-batchtopk-32x"
  sae_id: "15-andyrdt-131k"
  layer_idx: 15
  hook_point: "blocks.15.hook_resid_post"
  normalize_decoder: true
  weights_repo: "andyrdt/saes-llama-3.1-8b-instruct"
  weights_path: "resid_post_layer_15/trainer_0/ae.pt"
  n_features_total: 131072

architecture:
  d_model: 4096
  n_layers: 32
  vocab_size: 128256

sae_specs:
  decoder_shape: [131072, 4096]
  sae_type: "BatchTopK"
  k: 32

features:
  n_features: 300
  selection_mode: "contrast_delta"
  activation_stats_path: null
  selected_features_file: "outputs/selected_features_llama.json"
  tau_act: 2.0
  token_span: "last_n"
  token_span_last_n: 8

steering:
  alpha_grid: [0.0, 0.1, 0.2, 0.5, 1.0, 2.0, 5.0, 10.0, 20.0, 40.0]
  threshold_T: 0.10
  alpha0: 1.0
  tau: 0.1

benchmark:
  name: "salad_bench"
  prompt_count: 100
  prompt_csv: "data/prompts/salad_alpha.csv"
  prompt_template: "prompt column; refusal mode"

generation:
  max_new_tokens: 64

experiment:
  name: "llama3-8b-instruct-andyrdt-layer15"
  seed: 42
  phase: 1
